services:
  - type: web
    name: online-dominance-dashboard
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_SERVICE_ACCOUNT_KEYFILE
        sync: false
      - key: LEAD_EVENTS
        sync: false
      - key: ACTIVITY_EVENTS
        sync: false
      - key: GSC_SITE_URL
        sync: false
      - key: BITRIX_WEBHOOK_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: YANDEX_GPT_API_KEY
        sync: false
      - key: YANDEX_GPT_FOLDER_ID
        sync: false
      - key: TD_WEIGHT_WEB
        value: "0.7"
      - key: TD_WEIGHT_AI
        value: "0.3"
      - key: SNAPSHOT_TOKEN
        generateValue: true

  - type: cron
    name: weekly-snapshot
    runtime: docker
    region: singapore
    plan: free
    schedule: "0 6 * * 1"
    dockerCommand: |
      sh -c "curl -fsS -X POST -H 'Authorization: Bearer $SNAPSHOT_TOKEN' \
        $DASHBOARD_URL/api/snapshot"
    envVars:
      - key: DASHBOARD_URL
        value: https://online-dominance-dashboard.onrender.com
      - key: SNAPSHOT_TOKEN
        fromService:
          name: online-dominance-dashboard
          type: web
          envVarKey: SNAPSHOT_TOKEN

  - type: cron
    name: weekly-ai-brief
    runtime: docker
    region: singapore
    plan: free
    schedule: "0 1 * * 1"
    dockerCommand: |
      sh -c "curl -fsS -X POST -H 'Authorization: Bearer $SNAPSHOT_TOKEN' \
        $DASHBOARD_URL/api/brief/weekly"
    envVars:
      - key: DASHBOARD_URL
        value: https://online-dominance-dashboard.onrender.com
      - key: SNAPSHOT_TOKEN
        fromService:
          name: online-dominance-dashboard
          type: web
          envVarKey: SNAPSHOT_TOKEN
